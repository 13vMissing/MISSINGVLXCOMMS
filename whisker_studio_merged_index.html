
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whisker Studio</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Quicksand',sans-serif;
background:linear-gradient(135deg,#FFF6F7,#F8F0FF);
min-height:100vh;
}

.section{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.card{
background:white;
border-radius:20px;
padding:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.palette-color{
width:40px;
height:40px;
border-radius:8px;
display:inline-block;
margin:4px;
border:2px solid white;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.mood-preview img{
width:90px;
height:90px;
object-fit:cover;
border-radius:10px;
margin:5px;
}

.chat-button{
position:fixed;
bottom:20px;
right:20px;
width:70px;
height:70px;
border-radius:50%;
background:#F4A6C1;
font-size:36px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="section">

<h1 class="text-4xl font-bold mb-6 text-pink-400">🐾 Whisker Studio</h1>

<div class="card">

<h2 class="text-2xl font-bold mb-4">Commission Request</h2>

<label class="font-semibold">Character PNG</label>
<input id="charUpload" type="file" accept="image/png,image/jpeg" class="mb-4">

<label class="font-semibold">Pose Reference</label>
<input type="file" accept="image/*" class="mb-6">

<hr class="my-6">

<h3 class="text-xl font-bold mb-2">Moodboard Builder</h3>

<input id="moodUpload" type="file" multiple accept="image/*" class="mb-4">

<div id="moodPreview" class="mood-preview flex flex-wrap"></div>

<hr class="my-6">

<h3 class="text-xl font-bold mb-2">Color Palette Extractor</h3>

<canvas id="canvas" style="display:none"></canvas>

<div id="palette"></div>

<button onclick="downloadPalette()" class="mt-4 px-4 py-2 bg-pink-300 rounded-lg">
Download Palette
</button>

</div>
</div>

<div class="chat-button">🐱</div>

<script>

const moodUpload = document.getElementById("moodUpload");
const moodPreview = document.getElementById("moodPreview");

moodUpload.addEventListener("change", () => {
moodPreview.innerHTML = "";
[...moodUpload.files].forEach(file=>{
let img=document.createElement("img");
img.src=URL.createObjectURL(file);
moodPreview.appendChild(img);
});
});

const charUpload = document.getElementById("charUpload");
const paletteDiv = document.getElementById("palette");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

charUpload.addEventListener("change", () => {

let file = charUpload.files[0];
let img = new Image();
img.src = URL.createObjectURL(file);

img.onload = () => {

canvas.width = img.width;
canvas.height = img.height;
ctx.drawImage(img,0,0);

let data = ctx.getImageData(0,0,canvas.width,canvas.height).data;

let colors = {};

for(let i=0;i<data.length;i+=40){

let r=data[i];
let g=data[i+1];
let b=data[i+2];

let key=`${r},${g},${b}`;

colors[key]=(colors[key]||0)+1;
}

let sorted = Object.entries(colors).sort((a,b)=>b[1]-a[1]).slice(0,6);

paletteDiv.innerHTML="";

sorted.forEach(c=>{

let rgb=c[0].split(",");

let div=document.createElement("div");
div.className="palette-color";
div.style.background=`rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;

paletteDiv.appendChild(div);

});

}

});

function downloadPalette(){

let colors=[...paletteDiv.children].map(d=>d.style.background);

let canvas=document.createElement("canvas");
canvas.width=colors.length*80;
canvas.height=80;

let ctx=canvas.getContext("2d");

colors.forEach((c,i)=>{
ctx.fillStyle=c;
ctx.fillRect(i*80,0,80,80);
});

let link=document.createElement("a");
link.download="palette.png";
link.href=canvas.toDataURL();
link.click();

}

</script>

</body>
</html>
